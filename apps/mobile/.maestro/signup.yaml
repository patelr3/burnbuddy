appId: host.exp.exponent
tags:
  - auth
---
# Flow: Sign up with email and password
# Verifies a new user can create an account and reach the Home screen.
# Prerequisites: API running at localhost:3001.
# Note: Uses a unique email to avoid "email already in use" errors.
#       Override via CLI: maestro test -e SIGNUP_EMAIL=... -e SIGNUP_PASSWORD=... .maestro/signup.yaml

env:
  SIGNUP_DISPLAY_NAME: "Test User"
  SIGNUP_EMAIL: "signup-test-${Date.now()}@example.com"
  SIGNUP_PASSWORD: "testpassword123"

# Step 1 — Launch the app (state cleared via config.yaml onFlowStart)
- launchApp

# Step 2 — Verify Login screen is visible
- assertVisible: "Sign in to your account"

# Step 3 — Navigate to Sign Up screen
- tapOn:
    id: "login-sign-up-link"

# Step 4 — Verify Signup screen is visible
- assertVisible: "Create your account"

# Step 5 — Enter display name
- tapOn:
    id: "signup-display-name-input"
- inputText: "${SIGNUP_DISPLAY_NAME}"

# Step 6 — Enter email address
- tapOn:
    id: "signup-email-input"
- inputText: "${SIGNUP_EMAIL}"

# Step 7 — Enter password
- tapOn:
    id: "signup-password-input"
- inputText: "${SIGNUP_PASSWORD}"

# Step 8 — Tap Create Account button
- tapOn:
    id: "signup-create-account-button"

# Step 9 — Verify Home screen appears (tab bar visible)
- assertVisible:
    id: "tab-home"
    timeout: 10000
