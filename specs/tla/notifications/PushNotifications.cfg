\* PushNotifications TLC configuration
\* Models 3 users and 1 squad to verify notification targeting invariants
\* across all possible relationship and FCM token configurations.

INIT Init
NEXT Next

CONSTANT
    Uid = {u1, u2, u3}
    SquadId = {s1}

SYMMETRY Symmetry

INVARIANT
    TypeOK
    ResponseNeverBlocked
    NoSelfNotification
    AllPartnersTargeted
    OnlyTokenUsersReceive
    NoTokenSkippedCleanly

CHECK_DEADLOCK FALSE
