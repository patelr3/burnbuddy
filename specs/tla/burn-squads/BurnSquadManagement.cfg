\* BurnSquadManagement TLC configuration
\* Run with: java -XX:+UseParallelGC -cp ../tla2tools.jar tlc2.TLC BurnSquadManagement.tla -config BurnSquadManagement.cfg -workers auto

\* Use 3 model-value UIDs and 1 squad ID. This explores admin/member permission
\* interactions among 3 users. A single squad suffices since squad operations are
\* independent — adding more squad IDs multiplies the state space without testing
\* new invariant-relevant behavior (~9M states with 3 users, 1 squad).
CONSTANT
    Uid = {u1, u2, u3}
    SquadId = {s1}

\* Check all safety invariants
INVARIANT
    TypeOK
    ExactlyOneAdmin
    AdminInMembers
    CannotInviteNonFriends
    AdminOnlyInviteEnforced
    NoSelfInvites
    UniqueSquadIds
    JoinRequestReferencesSquad
    BoundedMembers
    SafetyInvariant

SPECIFICATION Spec
