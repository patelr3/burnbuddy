\* UserProfileManagement TLC configuration
\* Run with: java -XX:+UseParallelGC -cp ../tla2tools.jar tlc2.TLC UserProfileManagement.tla -config UserProfileManagement.cfg -workers auto

\* Use 3 model-value UIDs and 4 usernames to explore collision scenarios.
\* More usernames than users ensures there are always available names for creation;
\* the extra username enables testing username changes under contention.
CONSTANT
    Uid = {u1, u2, u3}
    Username = {name1, name2, name3, name4}

\* Check all safety invariants
INVARIANT
    TypeOK
    UsernameUniqueness
    UsernameChangeAtomic
    NoProfileWithoutReservation
    NoOrphanedReservations
    NoOrphanedAuthUsers
    DeletionIsComplete
    BoundedProfiles
    ReservationsMatchProfiles
    SafetyInvariant

SPECIFICATION Spec
