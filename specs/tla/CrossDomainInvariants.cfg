\* CrossDomainInvariants TLC configuration
\* Run with: java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC CrossDomainInvariants.tla -config CrossDomainInvariants.cfg -workers auto
\*
\* Uses small model bounds to keep the state space manageable while still
\* exercising all cross-domain interaction paths:
\* - 2 users: sufficient for buddy pairs, squad admin/member, workout owners
\* - 1 squad: squad operations are independent of squad count
\* - 2 workout IDs: enough for concurrent workout detection scenarios
\* - MaxTime = 3: covers within-window, after-window, and stale phases

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANT
    Uid = {u1, u2}
    SquadId = {s1}
    WorkoutId = {w1, w2}
    MaxTime = 3

SYMMETRY Symmetry

INVARIANT
    CrossDomainInvariant
