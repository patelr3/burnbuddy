name: Quality Checks

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - 'apps/web/**'
      - 'packages/shared/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared package
        run: yarn workspace @burnbuddy/shared build

      - name: Typecheck all packages
        run: yarn typecheck

      - name: Run API tests
        run: yarn workspace api test
