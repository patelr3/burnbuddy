name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_LOGIN_SERVER: burnbuddyacr.azurecr.io
  ACR_NAME: burnbuddyacr

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared package
        run: yarn workspace @burnbuddy/shared build

      - name: Typecheck all packages
        run: yarn typecheck

  deploy-beta:
    name: Deploy Web to Beta
    runs-on: ubuntu-latest
    needs: quality
    environment: beta
    env:
      AZURE_RESOURCE_GROUP: buddyburn-beta
      WEB_APP_NAME: buddyburn-beta-web
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Fetch Firebase config from Key Vault
        id: firebase
        run: |
          KV_NAME="${{ env.AZURE_RESOURCE_GROUP }}-kv"
          echo "Fetching Firebase web config from $KV_NAME..."
          API_KEY=$(az keyvault secret show --vault-name "$KV_NAME" --name firebase-web-api-key --query value -o tsv 2>/dev/null || echo "")
          AUTH_DOMAIN=$(az keyvault secret show --vault-name "$KV_NAME" --name firebase-web-auth-domain --query value -o tsv 2>/dev/null || echo "")
          PROJECT_ID=$(az keyvault secret show --vault-name "$KV_NAME" --name firebase-web-project-id --query value -o tsv 2>/dev/null || echo "")
          STORAGE_BUCKET=$(az keyvault secret show --vault-name "$KV_NAME" --name firebase-web-storage-bucket --query value -o tsv 2>/dev/null || echo "")
          SENDER_ID=$(az keyvault secret show --vault-name "$KV_NAME" --name firebase-web-messaging-sender-id --query value -o tsv 2>/dev/null || echo "")
          APP_ID=$(az keyvault secret show --vault-name "$KV_NAME" --name firebase-web-app-id --query value -o tsv 2>/dev/null || echo "")
          # Use KV values, fall back to GitHub secrets
          echo "FIREBASE_API_KEY=${API_KEY:-${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}}" >> "$GITHUB_OUTPUT"
          echo "FIREBASE_AUTH_DOMAIN=${AUTH_DOMAIN:-${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}}" >> "$GITHUB_OUTPUT"
          echo "FIREBASE_PROJECT_ID=${PROJECT_ID:-${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}}" >> "$GITHUB_OUTPUT"
          echo "FIREBASE_STORAGE_BUCKET=${STORAGE_BUCKET:-${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}}" >> "$GITHUB_OUTPUT"
          echo "FIREBASE_SENDER_ID=${SENDER_ID:-${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}}" >> "$GITHUB_OUTPUT"
          echo "FIREBASE_APP_ID=${APP_ID:-${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}}" >> "$GITHUB_OUTPUT"
          if [[ -z "${API_KEY:-${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}}" ]]; then
            echo "::warning::Firebase API key not found. Run scripts/setup-firebase-web-config.sh to configure."
          fi

      - name: Build and push web image
        run: |
          docker build \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=${{ steps.firebase.outputs.FIREBASE_API_KEY }} \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ steps.firebase.outputs.FIREBASE_AUTH_DOMAIN }} \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ steps.firebase.outputs.FIREBASE_PROJECT_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ steps.firebase.outputs.FIREBASE_STORAGE_BUCKET }} \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ steps.firebase.outputs.FIREBASE_SENDER_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=${{ steps.firebase.outputs.FIREBASE_APP_ID }} \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/burnbuddy/web:${{ steps.vars.outputs.TAG }} \
            .
          docker push ${{ env.ACR_LOGIN_SERVER }}/burnbuddy/web:${{ steps.vars.outputs.TAG }}

      - name: Deploy web to Container App
        run: |
          az containerapp update \
            --name ${{ env.WEB_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/burnbuddy/web:${{ steps.vars.outputs.TAG }}

  test-beta:
    name: E2E Tests (Beta)
    runs-on: ubuntu-latest
    needs: deploy-beta
    environment: beta
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get beta web URL
        id: url
        run: |
          FQDN=$(az containerapp show \
            --name buddyburn-beta-web \
            --resource-group buddyburn-beta \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "BASE_URL=https://${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          CI: true
          BASE_URL: ${{ steps.url.outputs.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-beta
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Write test results to summary
        if: always()
        run: |
          echo "## 🎭 E2E Tests — Beta" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Target:** \`${{ steps.url.outputs.BASE_URL }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ All E2E tests passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ E2E tests failed — check artifacts for screenshots and traces" >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy-prod:
    name: Deploy Web to Production
    runs-on: ubuntu-latest
    needs: test-beta
    environment: production
    env:
      AZURE_RESOURCE_GROUP: buddyburn-prod
      WEB_APP_NAME: buddyburn-prod-web
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Fetch Firebase config from Key Vault
        id: firebase
        run: |
          KV_NAME="${{ env.AZURE_RESOURCE_GROUP }}-kv"
          echo "Fetching Firebase web config from $KV_NAME..."
          API_KEY=$(az keyvault secret show --vault-name "$KV_NAME" --name firebase-web-api-key --query value -o tsv 2>/dev/null || echo "")
          AUTH_DOMAIN=$(az keyvault secret show --vault-name "$KV_NAME" --name firebase-web-auth-domain --query value -o tsv 2>/dev/null || echo "")
          PROJECT_ID=$(az keyvault secret show --vault-name "$KV_NAME" --name firebase-web-project-id --query value -o tsv 2>/dev/null || echo "")
          STORAGE_BUCKET=$(az keyvault secret show --vault-name "$KV_NAME" --name firebase-web-storage-bucket --query value -o tsv 2>/dev/null || echo "")
          SENDER_ID=$(az keyvault secret show --vault-name "$KV_NAME" --name firebase-web-messaging-sender-id --query value -o tsv 2>/dev/null || echo "")
          APP_ID=$(az keyvault secret show --vault-name "$KV_NAME" --name firebase-web-app-id --query value -o tsv 2>/dev/null || echo "")
          echo "FIREBASE_API_KEY=${API_KEY:-${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}}" >> "$GITHUB_OUTPUT"
          echo "FIREBASE_AUTH_DOMAIN=${AUTH_DOMAIN:-${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}}" >> "$GITHUB_OUTPUT"
          echo "FIREBASE_PROJECT_ID=${PROJECT_ID:-${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}}" >> "$GITHUB_OUTPUT"
          echo "FIREBASE_STORAGE_BUCKET=${STORAGE_BUCKET:-${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}}" >> "$GITHUB_OUTPUT"
          echo "FIREBASE_SENDER_ID=${SENDER_ID:-${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}}" >> "$GITHUB_OUTPUT"
          echo "FIREBASE_APP_ID=${APP_ID:-${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}}" >> "$GITHUB_OUTPUT"

      - name: Build and push web image
        run: |
          docker build \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=${{ steps.firebase.outputs.FIREBASE_API_KEY }} \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ steps.firebase.outputs.FIREBASE_AUTH_DOMAIN }} \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ steps.firebase.outputs.FIREBASE_PROJECT_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ steps.firebase.outputs.FIREBASE_STORAGE_BUCKET }} \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ steps.firebase.outputs.FIREBASE_SENDER_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=${{ steps.firebase.outputs.FIREBASE_APP_ID }} \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/burnbuddy/web:${{ steps.vars.outputs.TAG }} \
            .
          docker push ${{ env.ACR_LOGIN_SERVER }}/burnbuddy/web:${{ steps.vars.outputs.TAG }}

      - name: Deploy web to Container App
        run: |
          az containerapp update \
            --name ${{ env.WEB_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/burnbuddy/web:${{ steps.vars.outputs.TAG }}

  test-prod:
    name: E2E Tests (Production)
    runs-on: ubuntu-latest
    needs: deploy-prod
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get prod web URL
        id: url
        run: |
          FQDN=$(az containerapp show \
            --name buddyburn-prod-web \
            --resource-group buddyburn-prod \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "BASE_URL=https://${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          CI: true
          BASE_URL: ${{ steps.url.outputs.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-prod
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Write test results to summary
        if: always()
        run: |
          echo "## 🎭 E2E Tests — Production" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Target:** \`${{ steps.url.outputs.BASE_URL }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ All E2E tests passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ E2E tests failed — check artifacts for screenshots and traces" >> "$GITHUB_STEP_SUMMARY"
          fi
