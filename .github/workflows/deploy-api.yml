name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - 'packages/shared/**'
      - 'infra/**'
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: burnbuddyacr.azurecr.io
  ACR_NAME: burnbuddyacr

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared package
        run: yarn workspace @burnbuddy/shared build

      - name: Typecheck all packages
        run: yarn typecheck

      - name: Run API tests
        run: yarn workspace api test

  deploy-beta:
    name: Deploy API to Beta
    runs-on: ubuntu-latest
    needs: quality
    environment: beta
    env:
      AZURE_RESOURCE_GROUP: buddyburn-beta
      API_APP_NAME: buddyburn-beta-api
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        run: |
          docker build \
            -f services/api/Dockerfile \
            -t ${{ env.ACR_LOGIN_SERVER }}/burnbuddy/api:${{ steps.vars.outputs.TAG }} \
            .
          docker push ${{ env.ACR_LOGIN_SERVER }}/burnbuddy/api:${{ steps.vars.outputs.TAG }}

      - name: Deploy API to Container App
        run: |
          az containerapp update \
            --name ${{ env.API_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/burnbuddy/api:${{ steps.vars.outputs.TAG }}

  test-beta:
    name: Integration Tests (Beta)
    runs-on: ubuntu-latest
    needs: deploy-beta
    environment: beta
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Get beta API URL
        id: url
        run: |
          FQDN=$(az containerapp show \
            --name buddyburn-beta-api \
            --resource-group buddyburn-beta \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "BASE_URL=https://${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Run integration tests
        run: |
          chmod +x scripts/integration-test.sh
          BASE_URL=${{ steps.url.outputs.BASE_URL }} ./scripts/integration-test.sh

      - name: Write test results to summary
        if: always()
        run: |
          echo "## 🧪 API Integration Tests — Beta" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Target:** \`${{ steps.url.outputs.BASE_URL }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ All integration tests passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Integration tests failed — check job logs for details" >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy-prod:
    name: Deploy API to Production
    runs-on: ubuntu-latest
    needs: test-beta
    environment: production
    env:
      AZURE_RESOURCE_GROUP: buddyburn-prod
      API_APP_NAME: buddyburn-prod-api
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        run: |
          docker build \
            -f services/api/Dockerfile \
            -t ${{ env.ACR_LOGIN_SERVER }}/burnbuddy/api:${{ steps.vars.outputs.TAG }} \
            .
          docker push ${{ env.ACR_LOGIN_SERVER }}/burnbuddy/api:${{ steps.vars.outputs.TAG }}

      - name: Deploy API to Container App
        run: |
          az containerapp update \
            --name ${{ env.API_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/burnbuddy/api:${{ steps.vars.outputs.TAG }}

  test-prod:
    name: Integration Tests (Production)
    runs-on: ubuntu-latest
    needs: deploy-prod
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Get prod API URL
        id: url
        run: |
          FQDN=$(az containerapp show \
            --name buddyburn-prod-api \
            --resource-group buddyburn-prod \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "BASE_URL=https://${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Run integration tests
        run: |
          chmod +x scripts/integration-test.sh
          BASE_URL=${{ steps.url.outputs.BASE_URL }} ./scripts/integration-test.sh

      - name: Write test results to summary
        if: always()
        run: |
          echo "## 🧪 API Integration Tests — Production" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Target:** \`${{ steps.url.outputs.BASE_URL }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ All integration tests passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Integration tests failed — check job logs for details" >> "$GITHUB_STEP_SUMMARY"
          fi
